name: Dev Build

on:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: whisper-cli-linux-x86_64
            binary_name: whisper-cli
          - os: macos-15
            artifact_name: whisper-cli-macos-arm64
            binary_name: whisper-cli

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install PyTorch (CPU)
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            pip install torch torchaudio
          else
            pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          fi
        shell: bash

      - name: Install project and tools
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Run tests
        run: pytest tests/test_formatter.py tests/test_cli.py -v

      - name: Build binary
        run: pyinstaller whisper-cli.spec --noconfirm

      - name: Smoke test
        run: ./dist/${{ matrix.binary_name }} --version

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ steps.sha.outputs.short }}
          path: ./dist/${{ matrix.binary_name }}
          retention-days: 90
